<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>

/* GLOBAL */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center, #0f172a, #020617);
  text-align:center;
}

.title {
  font-size:70px;
  font-weight:bold;
  color:#22c55e;
  animation:glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px #22c55e; }
  to { text-shadow:0 0 40px #4ade80; }
}

.subtitle {
  margin-top:10px;
  opacity:0.7;
}

.enter {
  margin-top:30px;
  padding:15px 40px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.enter:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* STORE */
#store {
  display:none;
  padding:20px;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:20px;
}

.nav button {
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.nav button:hover {
  color:#22c55e;
}

/* SECTIONS */
.section { display:none; }
.active { display:block; }

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  width:260px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 25px #22c55e;
}

.popular {
  border:2px solid gold;
  box-shadow:0 0 25px gold;
}

img {
  width:100%;
  border-radius:10px;
}

/* BUTTON */
.buy {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="title">LEORIXMC</div>
  <div class="subtitle">India’s Next Generation Minecraft Server</div>
  <button class="enter" onclick="enterStore()">Enter Store</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks" class="section active">
<h2>💎 Ranks</h2>
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="buy" onclick="openPopup('Prime Rank')">Buy</button>
</div>

<div class="card popular">
<img src="mythic.png">
<h3>Mythic ₹249 ⭐</h3>
<button class="buy" onclick="openPopup('Mythic Rank')">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499 👑</h3>
<button class="buy" onclick="openPopup('Leorix+')">Buy</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<h2>🪙 Coins</h2>
<div class="container">

<div class="card"><img src="coin1.png"><h3>400</h3><button class="buy" onclick="openPopup('400 Coins')">₹99</button></div>
<div class="card popular"><img src="coin2.png"><h3>900 ⭐</h3><button class="buy" onclick="openPopup('900 Coins')">₹199</button></div>
<div class="card"><img src="coin3.png"><h3>1500</h3><button class="buy" onclick="openPopup('1500 Coins')">₹299</button></div>
<div class="card"><img src="coin4.png"><h3>2000</h3><button class="buy" onclick="openPopup('2000 Coins')">₹399</button></div>
<div class="card"><img src="coin5.png"><h3>2700 💎</h3><button class="buy" onclick="openPopup('2700 Coins')">₹499</button></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<h2>🎨 Tags</h2>
<div class="container">

<div class="card"><img src="toy.png"><h3>TOY</h3><button class="buy" onclick="openPopup('Toy Tag')">Buy</button></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><button class="buy" onclick="openPopup('Meow Tag')">Buy</button></div>
<div class="card popular"><img src="deadly.png"><h3>DEADLY</h3><button class="buy" onclick="openPopup('Deadly Tag')">Buy</button></div>

</div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Username</h2>
<input id="userInput"><br><br>
<button class="buy" onclick="confirmBuy()">Continue</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function enterStore(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('store').style.display='block';
}

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let selectedItem="";

function openPopup(item){
  selectedItem=item;
  document.getElementById('popup').style.display='flex';
}

function confirmBuy(){
  let user=document.getElementById('userInput').value;
  if(user===""){alert("Enter username");return;}
  alert("Buying "+selectedItem+" for "+user);
  document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
