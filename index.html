<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo {
  width:200px;
  filter:drop-shadow(0 0 20px #22c55e);
}

.title {
  font-size:55px;
}

.enter {
  margin-top:25px;
  padding:15px 40px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}

/* STORE */
#store { display:none; padding:30px; }

/* NAV */
.nav {
  text-align:center;
  margin-bottom:30px;
}

.nav button {
  margin:0 15px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  font-size:18px;
}

.nav button:hover {
  color:#22c55e;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  width:260px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px #22c55e;
}

.popular {
  border:2px solid gold;
  box-shadow:0 0 30px gold;
}

img {
  width:100%;
  border-radius:12px;
}

/* BUTTON */
.buy {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:450px;
  max-height:80%;
  overflow:auto;
}

h3 { color:#22c55e; }

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo">
  <div class="title">LEORIXMC STORE</div>
  <button class="enter" onclick="enterStore()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks">
<div class="container">

<div class="card">
<img src="prime.png">
<h2>Prime</h2>
<p>₹119</p>
<button class="buy" onclick="openRank('Prime')">View Details</button>
</div>

<div class="card popular">
<img src="mythic.png">
<h2>Mythic ⭐</h2>
<p>₹249</p>
<button class="buy" onclick="openRank('Mythic')">View Details</button>
</div>

<div class="card">
<img src="leorix.png">
<h2>Leorix+ 👑</h2>
<p>₹499</p>
<button class="buy" onclick="openRank('Leorix')">View Details</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" style="display:none;">
<div class="container">

<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card popular"><img src="coin2.png"><h3>900 Coins ⭐</h3><p>₹199</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p><button class="buy" onclick="openBuy()">Buy</button></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" style="display:none;">
<div class="container">

<div class="card">
<img src="toy.png">
<h3>TOY</h3>
<p>200 Coins</p>
<button class="buy" onclick="openBuy()">Buy</button>
</div>

<div class="card">
<img src="meow.png">
<h3>MEOW</h3>
<p>300 Coins</p>
<button class="buy" onclick="openBuy()">Buy</button>
</div>

<div class="card popular">
<img src="deadly.png">
<h3>DEADLY</h3>
<p>500 Coins</p>
<button class="buy" onclick="openBuy()">Buy</button>
</div>

</div>
</div>

</div>

<!-- RANK POPUP -->
<div id="rankPopup" class="popup">
<div class="box">
<h2 id="rankTitle"></h2>
<div id="rankDetails"></div>
<button class="buy" onclick="openCheckout()">Buy</button>
<button class="buy" onclick="closeRank()">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutPopup" class="popup">
<div class="box">
<h2>Enter Username</h2>
<input id="userInput"><br><br>
<button class="buy" onclick="confirmBuy()">Continue</button>
</div>
</div>

<script>

function enterStore(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('store').style.display='block';
}

function show(id){
  document.getElementById('ranks').style.display='none';
  document.getElementById('coins').style.display='none';
  document.getElementById('tags').style.display='none';
  document.getElementById(id).style.display='block';
}

function openRank(name){
  document.getElementById("rankPopup").style.display="flex";

  if(name==="Prime"){
    rankTitle.innerHTML="⭐ PRIME - ₹119";
    rankDetails.innerHTML=`
    <h3>Perks</h3>
    /sit /ec /pv 1 /home 3

    <h3>Kit</h3>
    Diamond Armour (Prot IV)<br>
    Sword Sharp III<br>
    Totems, Apples, Pearls
    `;
  }

  if(name==="Mythic"){
    rankTitle.innerHTML="🔥 MYTHIC - ₹249";
    rankDetails.innerHTML=`
    <h3>Perks</h3>
    /sit /ec /pv 1 /home 5

    <h3>Kit</h3>
    Netherite Gear<br>
    Crystals, Apples, Totems
    `;
  }

  if(name==="Leorix"){
    rankTitle.innerHTML="👑 LEORIX+ - ₹499";
    rankDetails.innerHTML=`
    <h3>Perks</h3>
    /craft /home 7

    <h3>Kit</h3>
    Max Netherite Gear<br>
    OP loot, Crystals, Totems
    `;
  }
}

function closeRank(){
  document.getElementById("rankPopup").style.display="none";
}

function openBuy(){
  document.getElementById("checkoutPopup").style.display="flex";
}

function openCheckout(){
  document.getElementById("checkoutPopup").style.display="flex";
}

function confirmBuy(){
  let user=document.getElementById("userInput").value;
  if(user===""){alert("Enter username");return;}
  alert("Purchase successful!");
  document.getElementById("checkoutPopup").style.display="none";
}

</script>

</body>
</html>
