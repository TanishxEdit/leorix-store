<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:'Segoe UI';
  background:url('bg.png') center/cover fixed;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

/* sections */
.section{display:none;padding:20px;}
.section.active{display:block;}

/* cards */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  width:260px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px #22c55e;
}

.card img{width:100%;}

/* buttons */
.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:20px;
  width:500px;
  max-height:80vh;
  overflow-y:auto;
  border-radius:10px;
}

.box h3{color:#22c55e;}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div>LeorixMC</div>
  <div>
    <button onclick="show('ranks')">Ranks</button>
    <button onclick="show('coins')">Coins</button>
    <button onclick="show('tags')">Tags</button>
  </div>
</div>

<!-- RANKS -->
<div id="ranks" class="section active">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="btn" onclick="openRank('Prime')">View</button>
<button class="btn">Buy</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="openRank('Mythic')">View</button>
<button class="btn">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="openRank('Leorix')">View</button>
<button class="btn">Buy</button>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

}
