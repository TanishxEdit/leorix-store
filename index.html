<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  overflow-x:hidden;
}

/* MOUSE GLOW */
#cursorGlow {
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle, rgba(34,197,94,0.35), transparent);
  border-radius:50%;
  pointer-events:none;
  filter:blur(25px);
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.logo {
  width:200px;
  filter:drop-shadow(0 0 20px #22c55e);
}

.enter {
  margin-top:20px;
  padding:15px 30px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.enter:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* STORE */
#store { display:none; padding:30px; }

/* NAV */
.nav {
  text-align:center;
  margin-bottom:30px;
}

.nav button {
  margin:0 15px;
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.nav button:hover {
  color:#22c55e;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  width:260px;
  transition:0.3s;
  text-align:center;
}

.card:hover {
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 25px #22c55e;
}

.popular {
  border:2px solid gold;
}

img {
  width:100%;
  border-radius:12px;
}

/* BUTTON */
.buy {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* POPUPS */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:450px;
  max-height:80%;
  overflow:auto;
}

h3 { color:#22c55e; }

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div id="cursorGlow"></div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo">
  <h1>LEORIXMC STORE</h1>
  <button class="enter" onclick="playClick(); enterStore()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="buy" onclick="playClick(); openRank('Prime')">View</button>
</div>

<div class="card popular">
<img src="mythic.png">
<h3>Mythic ₹249 ⭐</h3>
<button class="buy" onclick="playClick(); openRank('Mythic')">View</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499 👑</h3>
<button class="buy" onclick="playClick(); openRank('Leorix')">View</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" style="display:none;">
<div class="container">

<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card popular"><img src="coin2.png"><h3>900 Coins ⭐</h3><p>₹199</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" style="display:none;">
<div class="container">

<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>
<div class="card popular"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p><button class="buy" onclick="playClick(); openBuy()">Buy</button></div>

</div>
</div>

</div>

<!-- RANK POPUP -->
<div id="rankPopup" class="popup">
<div class="box">
<h2 id="rankTitle"></h2>
<div id="rankDetails"></div>
<button class="buy" onclick="playClick(); openCheckout()">Buy</button>
<button class="buy" onclick="closeRank()">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutPopup" class="popup">
<div class="box">
<h2>Enter Username</h2>
<input id="userInput"><br><br>
<button class="buy" onclick="playClick(); confirmBuy()">Continue</button>
</div>
</div>

<!-- CLICK SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<script>

/* SOUND */
function playClick(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

/* NAV */
function enterStore(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('store').style.display='block';
}

function show(id){
  document.getElementById('ranks').style.display='none';
  document.getElementById('coins').style.display='none';
  document.getElementById('tags').style.display='none';
  document.getElementById(id).style.display='block';
}

/* RANK POPUP */
function openRank(name){
  rankPopup.style.display="flex";

  if(name==="Prime"){
    rankTitle.innerHTML="⭐ PRIME - ₹119";
    rankDetails.innerHTML=`<h3>Perks</h3>/sit /ec /pv 1 /home 3
    <h3>Kit</h3>Diamond Armour Prot IV<br>Sword Sharp III<br>Totems, Apples`;
  }

  if(name==="Mythic"){
    rankTitle.innerHTML="🔥 MYTHIC - ₹249";
    rankDetails.innerHTML=`<h3>Perks</h3>/sit /ec /pv 1 /home 5
    <h3>Kit</h3>Netherite Gear<br>Crystals, Totems`;
  }

  if(name==="Leorix"){
    rankTitle.innerHTML="👑 LEORIX+ - ₹499";
    rankDetails.innerHTML=`<h3>Perks</h3>/craft /home 7
    <h3>Kit</h3>Max Gear<br>OP Loot`;
  }
}

function closeRank(){rankPopup.style.display="none";}

/* BUY */
function openBuy(){checkoutPopup.style.display="flex";}
function openCheckout(){checkoutPopup.style.display="flex";}

function confirmBuy(){
  let user=userInput.value;
  if(user===""){alert("Enter username");return;}
  alert("Purchase successful!");
  checkoutPopup.style.display="none";
}

/* MOUSE GLOW */
const glow=document.getElementById("cursorGlow");
let x=0,y=0,px=0,py=0;

document.addEventListener("mousemove",(e)=>{
  x=e.clientX;y=e.clientY;
});

function animate(){
  px+=(x-px)*0.15;
  py+=(y-py)*0.15;
  glow.style.left=px+"px";
  glow.style.top=py+"px";
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
