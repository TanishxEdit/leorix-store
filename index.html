<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Segoe UI;
  background:url('bg.png') center/cover fixed;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

/* cards */
.container{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  width:260px;
  text-align:center;
}

.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  align-items:center;
  justify-content:center;
}

/* THIS FIXES SCROLL */
.box{
  background:#1e293b;
  width:500px;
  max-height:80vh;
  display:flex;
  flex-direction:column;
  border-radius:10px;
  overflow:hidden;
}

/* header */
.popup-header{
  padding:15px;
  background:#111827;
  font-weight:bold;
}

/* scrollable content */
.popup-content{
  padding:15px;
  overflow-y:auto;
  max-height:60vh;
}

/* footer */
.popup-footer{
  padding:10px;
}
</style>
</head>

<body>

<div class="navbar">
  <div>LeorixMC</div>
</div>

<div class="container">

<div class="card">
<h3>Prime ₹119</h3>
<button class="btn" onclick="openRank('Prime')">View</button>
</div>

<div class="card">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="openRank('Mythic')">View</button>
</div>

<div class="card">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="openRank('Leorix')">View</button>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="box">
    
    <div class="popup-header" id="title"></div>

    <div class="popup-content" id="content"></div>

    <div class="popup-footer">
      <button class="btn" onclick="closePopup()">Close</button>
    </div>

  </div>
</div>

function closePopup(){

</script>

</body>
</html>
