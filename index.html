<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Segoe UI;
  background:url('bg.png') center/cover fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-2;
}

/* navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

.navbar button{
  background:none;
  border:none;
  color:white;
  margin:0 10px;
  cursor:pointer;
}

/* sections */
.section{display:none;padding:20px;}
.section.active{display:block;}

/* cards */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  width:250px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px #22c55e;
}

.card img{width:100%;}

/* buttons */
.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy-btn{
  background:linear-gradient(45deg,#22c55e,#4ade80);
}

/* popup */
.popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:20px;
  width:500px;
  max-height:80vh;
  overflow-y:auto;
  border-radius:10px;
}

.box h3{color:#22c55e;}

/* snow */
#snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<!-- NAV -->
<div class="navbar">
  <div>LeorixMC</div>
  <div>
    <button onclick="show('ranks')">Ranks</button>
    <button onclick="show('coins')">Coins</button>
    <button onclick="show('tags')">Tags</button>
  </div>
</div>

<!-- RANKS -->
<div id="ranks" class="section active">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="btn" onclick="playClick(); openRank('Prime')">View</button>
<button class="btn buy-btn">Buy</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="playClick(); openRank('Mythic')">View</button>
<button class="btn buy-btn">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="playClick(); openRank('Leorix')">View</button>
<button class="btn buy-btn">Buy</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<div class="container">
<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p></div>
</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<div class="container">
<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* sound */
function playClick(){
  let s=document.getElementById("clickSound");
  if(s){ s.currentTime=0; s.play().catch(()=>{}); }
}

/* nav */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* FULL DATA */
function openRank(name){
  popup.style.display="flex";

  if(name==="Prime"){
    title.innerText="PRIME ₹119";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 3<br><br>Diamond Armour (Protection IV)<br>Diamond Sword (Sharpness III)<br>Diamond Pickaxe (Efficiency V)<br>Diamond Axe (Efficiency V)<br>Trident (Mending)<br>Mace(Mending)<br>Crossbow (QuickCharge, Multishot)<br>Bottle Of Enchanting (x64)<br>Golden Carrot (x32)<br>Golden Apple (x32)<br>Enchanted Golden Apple (x10)<br>EnderPearl (x16)<br>Respawn Anchor (x16)<br>GlowStone (x16)<br>Obsidian (x16)<br>Crystal (x16)<br>Totem (x2)`;
  }

  if(name==="Mythic"){
    title.innerText="MYTHIC ₹249";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 5<br><br>Netherite Armour (Protection IV, Swift Sneak III, Soul Speed III)<br>Netherite Sword (Maxed)<br>Netherite Pickaxe (Silk Touch)<br>Netherite Axe (Maxed)<br>Trident (Riptide III)<br>Mace (Wind Burst II)<br>Crossbow (QuickCharge, Multishot)<br>Bow (Infinity, Mending)<br>Golden Carrot (x32)<br>Golden Apple (x64)<br>Enchanted Golden Apple (x10)<br>EnderPearl (x16)<br>Respawn Anchor (x32)<br>GlowStone (x32)<br>Obsidian (x32)<br>Crystal (x32)<br>Totem (x2)`;
  }

  if(name==="Leorix"){
    title.innerText="LEORIX+ ₹499";
    content.innerHTML=`✔ /pv 1<br>✔ /ec<br>✔ /craft<br>✔ /home 7<br><br>Netherite Armour (Protection VI, Swift Sneak III, Soul Speed III)<br>Netherite Sword (Maxed)<br>Netherite Pickaxe (Silk Touch)<br>Netherite Axe (Maxed)<br>Trident (Riptide III)<br>Mace (Wind Burst III)<br>Crossbow (QuickCharge, Multishot)<br>Bow (Infinity, Mending)<br>Golden Carrot (x64)<br>Golden Apple (x64)<br>Enchanted Golden Apple (x15)<br>EnderPearl (x16)<br>Respawn Anchor (x64)<br>GlowStone (x64)<br>Obsidian (x64)<br>Crystal (x64)<br>Totem (x2)`;
  }
}

function closePopup(){
  popup.style.display="none";
}

/* SNOW */
const c=document.getElementById("snow");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let snow=[];
for(let i=0;i<100;i++){
  snow.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*3});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";
  snow.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=1;
    if(s.y>c.height)s.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
