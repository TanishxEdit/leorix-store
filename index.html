<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
}

/* PARTICLES */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  color:#22c55e;
  z-index:9999;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title {
  font-size:60px;
  color:#22c55e;
  text-shadow:0 0 25px #22c55e;
}

/* LOGO */
.logo {
  width:200px;
  margin-bottom:15px;
  filter:drop-shadow(0 0 15px #22c55e);
}

.enter {
  margin-top:20px;
  padding:15px 30px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* STORE */
#store { display:none; padding:20px; }

/* NAV */
.nav {
  position:relative;
  text-align:center;
}

.nav img {
  position:absolute;
  left:20px;
  top:10px;
  width:70px;
  filter:drop-shadow(0 0 10px #22c55e);
}

.nav button {
  margin:10px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  width:260px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.08);
  box-shadow:0 0 30px #22c55e;
}

.popular {
  border:2px solid gold;
}

img {
  width:100%;
  border-radius:10px;
}

.buy {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* POPUPS */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.rank-box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:400px;
  max-height:80%;
  overflow:auto;
}

.checkout-box {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:300px;
}

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="loader">Loading LeorixMC...</div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo">
  <div class="title">LEORIXMC</div>
  <button class="enter" onclick="enterStore()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <img src="logo.png">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks">
<div class="container">

<div class="card">
<img src="prime.png">
<button class="buy" onclick="openRank('Prime')">View</button>
</div>

<div class="card popular">
<img src="mythic.png">
<button class="buy" onclick="openRank('Mythic')">View</button>
</div>

<div class="card">
<img src="leorix.png">
<button class="buy" onclick="openRank('Leorix')">View</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" style="display:none;">
<div class="container">

<div class="card"><img src="coin1.png"></div>
<div class="card"><img src="coin2.png"></div>
<div class="card"><img src="coin3.png"></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" style="display:none;">
<div class="container">

<div class="card"><img src="toy.png"></div>
<div class="card"><img src="meow.png"></div>
<div class="card"><img src="deadly.png"></div>

</div>
</div>

</div>

<!-- RANK POPUP -->
<div id="rankPopup" class="popup">
<div class="rank-box">
<h2 id="rankTitle"></h2>
<p id="rankDetails"></p>
<button class="buy" onclick="openCheckout()">Buy</button>
<button class="buy" onclick="closeRank()" style="background:red;">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutPopup" class="popup">
<div class="checkout-box">
<h2>Enter Username</h2>
<input id="userInput"><br><br>
<button class="buy" onclick="confirmBuy()">Continue</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(()=>loader.style.display="none",1500);
};

/* NAV */
function enterStore(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('store').style.display='block';
}

function show(id){
  document.getElementById('ranks').style.display='none';
  document.getElementById('coins').style.display='none';
  document.getElementById('tags').style.display='none';
  document.getElementById(id).style.display='block';
}

/* SOUND */
function playClick(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

/* RANK DATA */
function openRank(name){
  playClick();
  rankPopup.style.display="flex";

  if(name==="Prime"){
    rankTitle.innerText="⭐ Prime - ₹119";
    rankDetails.innerHTML="✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 3<br><br>Diamond Gear + Totems";
  }

  if(name==="Mythic"){
    rankTitle.innerText="🔥 Mythic - ₹249";
    rankDetails.innerHTML="✔ /home 5<br>✔ perks<br><br>Netherite Gear + Crystals";
  }

  if(name==="Leorix"){
    rankTitle.innerText="👑 Leorix+ - ₹499";
    rankDetails.innerHTML="✔ /craft<br>✔ /home 7<br><br>Max Gear + OP loot";
  }
}

function closeRank(){
  rankPopup.style.display="none";
}

/* CHECKOUT */
function openCheckout(){
  checkoutPopup.style.display="flex";
}

function confirmBuy(){
  let user=document.getElementById("userInput").value;
  if(user===""){alert("Enter username");return;}
  alert("Success!");
  checkoutPopup.style.display="none";
}

/* PARTICLES */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.d;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
