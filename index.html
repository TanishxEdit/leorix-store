<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  font-family:Segoe UI;
  background:url('bg.png') center/cover fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* cursor glow */
#cursor{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle, #22c55e, transparent);
  border-radius:50%;
  pointer-events:none;
  filter:blur(40px);
  transform:translate(-50%,-50%);
}

/* HOME */
#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.logo{
  font-size:90px;
  font-weight:900;
  background:linear-gradient(90deg,#22c55e,#4ade80,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glow 2s infinite alternate, float 3s infinite alternate;
}

.subtitle{
  letter-spacing:8px;
  margin-bottom:30px;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #22c55e; }
  to{ text-shadow:0 0 50px #4ade80; }
}
@keyframes float{
  from{ transform:translateY(0); }
  to{ transform:translateY(-12px); }
}

/* sections */
.section{
  display:none;
  min-height:100vh;
  padding:40px;
  text-align:center;
}

/* buttons */
.btn{
  padding:15px 25px;
  margin:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #22c55e;
}

/* back */
.back{
  position:absolute;
  top:20px;
  left:20px;
}

/* cards */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  width:260px;
  transition:.4s;
}
.card:hover{
  transform:rotateX(5deg) rotateY(5deg) scale(1.07);
  box-shadow:0 0 50px #22c55e;
}
.card img{width:100%;}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  width:520px;
  max-height:80vh;
  overflow-y:auto;
  padding:25px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="cursor"></div>

<!-- HOME -->
<div id="home">
<h1 class="logo">LEORIXMC</h1>
<p class="subtitle">STORE</p>

<button class="btn" onclick="go('ranks')">RANKS</button>
<button class="btn" onclick="go('coins')">COINS</button>
<button class="btn" onclick="go('tags')">TAGS</button>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
<button class="btn back" onclick="go('home')">⬅ Back</button>

<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>

</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="openRank('Mythic')">View</button>
<button class="btn">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="openRank('Leorix')">View</button>
<button class="btn">Buy</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<button class="btn back" onclick="go('home')">⬅ Back</button>

<div class="container">
<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p></div>
</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<button class="btn back" onclick="go('home')">⬅ Back</button>

<div class="container">
<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* nav */
function go(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll('.section').forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function closePopup(){
  popup.style.display="none";
}

/* cursor */
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>
