<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Segoe UI;
  background:url('bg.png') center/cover fixed;
  color:white;
  overflow:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* snow */
#snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

/* cursor */
#cursor{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle,#22c55e,transparent);
  border-radius:50%;
  pointer-events:none;
  filter:blur(40px);
  z-index:999;
}

/* PAGES */
.page{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  padding:40px;
  box-sizing:border-box;
  overflow-y:auto;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  opacity:0;
  transform:scale(1.1);
  filter:blur(10px);
  transition:all 0.4s ease;
}

.page.active{
  display:flex;
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}

/* logo */
.logo{
  font-size:90px;
  font-weight:900;
  background:linear-gradient(90deg,#22c55e,#4ade80,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px #22c55e;
}

/* buttons */
.btn{
  padding:15px 25px;
  margin:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* back */
.back{
  position:absolute;
  top:20px;
  left:20px;
}

/* cards */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:15px;
  width:260px;
  transition:.3s;
}
.card:hover{
  transform:scale(1.07);
  box-shadow:0 0 40px #22c55e;
}
.card img{width:100%;}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.box{
  background:#1e293b;
  width:520px;
  max-height:80vh;
  overflow-y:auto;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="cursor"></div>

<!-- HOME -->
<div id="home" class="page active">
<h1 class="logo">LEORIXMC</h1>

<button class="btn" onclick="playClick(); go('ranks')">RANKS</button>
<button class="btn" onclick="playClick(); go('coins')">COINS</button>
<button class="btn" onclick="playClick(); go('tags')">TAGS</button>
</div>

<!-- RANKS -->
<div id="ranks" class="page">
<button class="btn back" onclick="playClick(); go('home')">⬅ Back</button>

<div class="container">
<div class="card"><img src="prime.png"><h3>Prime ₹119</h3><button class="btn" onclick="playClick(); openRank('Prime')">View</button><button class="btn" onclick="playClick()">Buy</button></div>
<div class="card"><img src="mythic.png"><h3>Mythic ₹249</h3><button class="btn" onclick="playClick(); openRank('Mythic')">View</button><button class="btn" onclick="playClick()">Buy</button></div>
<div class="card"><img src="leorix.png"><h3>Leorix+ ₹499</h3><button class="btn" onclick="playClick(); openRank('Leorix')">View</button><button class="btn" onclick="playClick()">Buy</button></div>
</div>
</div>

<!-- COINS -->
<div id="coins" class="page">
<button class="btn back" onclick="playClick(); go('home')">⬅ Back</button>

<div class="container">
<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p></div>
</div>
</div>

<!-- TAGS -->
<div id="tags" class="page">
<button class="btn back" onclick="playClick(); go('home')">⬅ Back</button>

<div class="container">
<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<p style="color:#4ade80;"><b>Available every 15 days</b></p>
<button class="btn" onclick="playClick(); closePopup()">Close</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* navigation */
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* sound */
function playClick(){
  let s=document.getElementById("clickSound");
  if(s){s.currentTime=0;s.play().catch(()=>{});}
}

/* RANK DATA */
function openRank(name){
  popup.style.display="flex";

  if(name==="Prime"){
    title.innerHTML="PRIME ₹119";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 3<br><br>
Diamond Armour (Protection IV)<br>
Diamond Sword (Sharpness III)<br>
Diamond Pickaxe (Efficiency V)<br>
Diamond Axe (Efficiency V)<br>

Golden Carrot (x32)<br>
Golden Apple (x32)<br>

EnderPearl (x16)<br>
Respawn Anchor (x16)<br>
GlowStone (x16)<br>
Obsidian (x16)<br>
Crystal (x16)<br>
Totem (x2)`;
  }

  if(name==="Mythic"){
    title.innerHTML="MYTHIC ₹249";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 5<br><br>
Netherite Armour (Protection IV, Swift Sneak III, Soul Speed III)<br>
Netherite Sword (Maxed)<br>
Netherite Pickaxe (Silk Touch)<br>
Netherite Axe (Maxed)<br>
Trident (Riptide III)<br>
Mace (Wind Burst II)<br>

Bow (Infinity, Mending)<br>

Golden Apple (x64)<br>
Enchanted Golden Apple (x10)<br>
EnderPearl (x16)<br>
Respawn Anchor (x32)<br>
GlowStone (x32)<br>
Obsidian (x32)<br>
Crystal (x32)<br>
Totem (x2)`;
  }

  if(name==="Leorix"){
    title.innerHTML="LEORIX+ ₹499";
    content.innerHTML=`✔ /pv 1<br>✔ /ec<br>✔ /craft<br>✔ /home 7<br><br>
Netherite Armour (Protection VI, Swift Sneak III, Soul Speed III)<br>
Netherite Sword (Maxed)<br>
Netherite Pickaxe (Silk Touch)<br>
Netherite Axe (Maxed)<br>
Trident (Riptide III)<br>
Mace (Wind Burst III)<br>
Crossbow (QuickCharge, Multishot)<br>
Bow (Infinity, Mending)<br>
Golden Carrot (x64)<br>
Golden Apple (x64)<br>
Enchanted Golden Apple (x15)<br>
EnderPearl (x16)<br>
Respawn Anchor (x64)<br>
GlowStone (x64)<br>
Obsidian (x64)<br>
Crystal (x64)<br>
Totem (x2)`;
  }
}

function closePopup(){
  popup.style.display="none";
}

/* cursor glow */
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* SNOW */
const snow=document.getElementById("snow");
const ctx=snow.getContext("2d");
snow.width=window.innerWidth;
snow.height=window.innerHeight;

let flakes=[];
for(let i=0;i<100;i++){
  flakes.push({x:Math.random()*snow.width,y:Math.random()*snow.height,r:Math.random()*3});
}

function drawSnow(){
  ctx.clearRect(0,0,snow.width,snow.height);
  ctx.fillStyle="white";
  flakes.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fill();
    f.y+=1;
    if(f.y>snow.height){
      f.y=0;
      f.x=Math.random()*snow.width;
    }
  });
  requestAnimationFrame(drawSnow);
}
drawSnow();

</script>

</body>
</html>
