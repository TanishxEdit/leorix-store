<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.logo {
  width:180px;
  filter:drop-shadow(0 0 15px #22c55e);
}

.title {
  font-size:45px;
}

.enter {
  margin-top:20px;
  padding:12px 25px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* STORE */
#store { display:none; padding:20px; }

.nav {
  text-align:center;
}

.nav button {
  margin:10px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  width:240px;
  text-align:center;
}

.card:hover {
  transform:scale(1.05);
}

img {
  width:100%;
  border-radius:10px;
}

.buy {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* POPUPS */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.box {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:400px;
  max-height:80%;
  overflow:auto;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo">
  <div class="title">LEORIXMC STORE</div>
  <button class="enter" onclick="enterStore()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime - ₹119</h3>
<button class="buy" onclick="openRank('Prime')">View</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic - ₹249</h3>
<button class="buy" onclick="openRank('Mythic')">View</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ - ₹499</h3>
<button class="buy" onclick="openRank('Leorix')">View</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" style="display:none;">
<div class="container">

<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p><button class="buy" onclick="openBuy()">Buy</button></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" style="display:none;">
<div class="container">

<div class="card"><img src="toy.png"><h3>TOY</h3><p>100 Coins</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>100 Coins</p><button class="buy" onclick="openBuy()">Buy</button></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>150 Coins</p><button class="buy" onclick="openBuy()">Buy</button></div>

</div>
</div>

</div>

<!-- RANK POPUP -->
<div id="rankPopup" class="popup">
<div class="box">
<h2 id="rankTitle"></h2>
<div id="rankDetails"></div>
<button class="buy" onclick="openCheckout()">Buy</button>
<button class="buy" onclick="closeRank()">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutPopup" class="popup">
<div class="box">
<h2>Enter Username</h2>
<input id="userInput"><br><br>
<button class="buy" onclick="confirmBuy()">Continue</button>
</div>
</div>

<script>

function enterStore(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('store').style.display='block';
}

function show(id){
  document.getElementById('ranks').style.display='none';
  document.getElementById('coins').style.display='none';
  document.getElementById('tags').style.display='none';
  document.getElementById(id).style.display='block';
}

function openRank(name){
  document.getElementById("rankPopup").style.display="flex";

  if(name==="Prime"){
    rankTitle.innerText="PRIME - ₹119";
    rankDetails.innerHTML=`✔ /sit ✔ /ec ✔ /pv 1 ✔ /home 3<br><br>Diamond Gear + Totems + Apples`;
  }

  if(name==="Mythic"){
    rankTitle.innerText="MYTHIC - ₹249";
    rankDetails.innerHTML=`✔ /home 5<br><br>Netherite Gear + Crystals`;
  }

  if(name==="Leorix"){
    rankTitle.innerText="LEORIX+ - ₹499";
    rankDetails.innerHTML=`✔ /craft ✔ /home 7<br><br>Max Gear + OP Loot`;
  }
}

function closeRank(){
  document.getElementById("rankPopup").style.display="none";
}

function openBuy(){
  document.getElementById("checkoutPopup").style.display="flex";
}

function openCheckout(){
  document.getElementById("checkoutPopup").style.display="flex";
}

function confirmBuy(){
  let user=document.getElementById("userInput").value;
  if(user===""){alert("Enter username");return;}
  alert("Success!");
  document.getElementById("checkoutPopup").style.display="none";
}

</script>

</body>
</html>
