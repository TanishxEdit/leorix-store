<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  color:white;
  overflow-x:hidden;
  transition:0.5s;
}

/* BACKGROUNDS */
.home-bg { background:url('bg-home.jpg') center/cover fixed; }
.coins-bg { background:url('bg-coins.jpg') center/cover fixed; }
.tags-bg { background:url('bg-tags.jpg') center/cover fixed; }

/* DARK OVERLAY */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* SNOW */
#snow {
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.logo { width:200px; }

.enter {
  margin-top:20px;
  padding:15px 30px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* STORE */
#store { display:none; padding:30px; }

/* NAV */
.nav { text-align:center; margin-bottom:30px; }
.nav button {
  margin:0 15px;
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  width:260px;
  text-align:center;
}

img { width:100%; border-radius:12px; }

.buy {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:500px;
  max-height:80vh;
  overflow-y:auto;
}

h3 { color:#22c55e; }
</style>
</head>

<body class="home-bg">

<canvas id="snow"></canvas>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" class="logo">
  <h1>LEORIXMC STORE</h1>
  <button class="enter" onclick="enterStore()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store">

<div class="nav">
  <button onclick="show('ranks')">Ranks</button>
  <button onclick="show('coins')">Coins</button>
  <button onclick="show('tags')">Tags</button>
</div>

<!-- RANKS -->
<div id="ranks">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="buy" onclick="openRank('Prime')">View</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="buy" onclick="openRank('Mythic')">View</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="buy" onclick="openRank('Leorix')">View</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" style="display:none;">
<div class="container">
<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p></div>
</div>
</div>

<!-- TAGS -->
<div id="tags" style="display:none;">
<div class="container">
<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>
</div>
</div>

</div>

<!-- POPUP -->
<div id="rankPopup" class="popup">
<div class="box">
<h2 id="rankTitle"></h2>
<div id="rankDetails"></div>
<button class="buy" onclick="closeRank()">Close</button>
</div>
</div>

<script>

/* SWITCH TABS + BACKGROUND */
function show(id){
  ranks.style.display='none';
  coins.style.display='none';
  tags.style.display='none';

  document.getElementById(id).style.display='block';

  document.body.className = 
    id==="coins" ? "coins-bg" :
    id==="tags" ? "tags-bg" : "home-bg";
}

function enterStore(){
  document.querySelector('.hero').style.display='none';
  store.style.display='block';
}

/* RANK DATA */
function openRank(name){
  rankPopup.style.display="flex";

  if(name==="Prime"){
    rankTitle.innerHTML="PRIME ₹119";
    rankDetails.innerHTML=`Diamond Armour Prot IV<br>Full starter kit`;
  }

  if(name==="Mythic"){
    rankTitle.innerHTML="MYTHIC ₹249";
    rankDetails.innerHTML=`Netherite kit + crystals`;
  }

  if(name==="Leorix"){
    rankTitle.innerHTML="LEORIX+ ₹499";
    rankDetails.innerHTML=`MAX gear + OP items`;
  }
}

function closeRank(){ rankPopup.style.display="none"; }

/* SNOW */
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let snow=[];
for(let i=0;i<100;i++){
  snow.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  snow.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=1;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
