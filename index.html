<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:Segoe UI;
  background:url('bg.png') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

/* overlay */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

/* sections */
.section { display:none; padding:20px; }
.active { display:block; }

/* cards */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  width:250px;
  text-align:center;
}

.card img { width:100%; }

.btn {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* popup */
.popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box {
  background:#1e293b;
  padding:20px;
  width:450px;
  max-height:80vh;
  overflow-y:auto;
  border-radius:10px;
}

/* snow */
#snow {
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<!-- NAV -->
<div class="navbar">
  <div>LeorixMC</div>
  <div>
    <button onclick="show('ranks')">Ranks</button>
    <button onclick="show('coins')">Coins</button>
    <button onclick="show('tags')">Tags</button>
  </div>
</div>

<!-- RANKS -->
<div id="ranks" class="section active">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="btn" onclick="playClick(); openRank('Prime')">View</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="playClick(); openRank('Mythic')">View</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="playClick(); openRank('Leorix')">View</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<div class="container">

<div class="card">
<img src="coin1.png">
<h3>400 Coins</h3>
<p>₹99</p>
<button class="btn" onclick="playClick()">Buy</button>
</div>

<div class="card">
<img src="coin2.png">
<h3>900 Coins</h3>
<p>₹199</p>
<button class="btn" onclick="playClick()">Buy</button>
</div>

<div class="card">
<img src="coin3.png">
<h3>1500 Coins</h3>
<p>₹299</p>
<button class="btn" onclick="playClick()">Buy</button>
</div>

<div class="card">
<img src="coin4.png">
<h3>2000 Coins</h3>
<p>₹399</p>
<button class="btn" onclick="playClick()">Buy</button>
</div>

<div class="card">
<img src="coin5.png">
<h3>2700 Coins</h3>
<p>₹499</p>
<button class="btn" onclick="playClick()">Buy</button>
</div>

</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<div class="container">

<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<script>

/* SOUND */
function playClick(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

/* TABS */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* RANK DETAILS */
function openRank(name){
  popup.style.display="flex";

  if(name==="Prime"){
    title.innerText="Prime ₹119";
    content.innerHTML=`✔ /sit /ec /pv 1 /home 3<br><br>
    Diamond Armour Prot IV<br>
    Sword Sharp III<br>
    Totem x2 + Apples`;
  }

  if(name==="Mythic"){
    title.innerText="Mythic ₹249";
    content.innerHTML=`✔ /home 5<br><br>
    Netherite Armour + Crystals`;
  }

  if(name==="Leorix"){
    title.innerText="Leorix+ ₹499";
    content.innerHTML=`✔ /craft /home 7<br><br>
    MAX Gear + OP Items`;
  }
}

function closePopup(){
  popup.style.display="none";
}

/* SNOW */
const c=document.getElementById("snow");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let snow=[];
for(let i=0;i<120;i++){
  snow.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*3});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";
  snow.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=1;
    if(s.y>c.height)s.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
