<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav button {
  background:none;
  border:none;
  color:white;
  margin:0 10px;
  cursor:pointer;
  font-size:16px;
}

.nav button:hover {
  color:gold;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px;
  background:linear-gradient(90deg, #ff0000, #ff8800);
  font-size:30px;
  font-weight:bold;
}

/* SECTIONS */
.section {
  display:none;
  padding:30px;
}

.active {
  display:block;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  width:280px;
  padding:20px;
  transition:0.3s;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card:hover {
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 25px #22c55e;
}

.popular {
  border:2px solid gold;
  box-shadow:0 0 25px gold;
}

img {
  width:100%;
  border-radius:10px;
}

button.buy {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button.buy:hover {
  background:#16a34a;
}

/* LOGIN */
#login {
  text-align:center;
  margin-top:50px;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>🔥 LeorixMC</div>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('ranks')">Ranks</button>
    <button onclick="show('coins')">Coins</button>
    <button onclick="show('tags')">Tags</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">🔥 40% OFF SALE 🔥</div>

  <div id="login">
    <h2>Enter Username</h2>
    <input id="username"><br><br>
    <button class="buy" onclick="login()">Login</button>
  </div>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
<h2>💎 Ranks</h2>
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime - ₹119</h3>
<p>Starter perks + kits</p>
<button class="buy" onclick="clickSound()">Buy</button>
</div>

<div class="card popular">
<img src="mythic.png">
<h3>Mythic - ₹249 ⭐</h3>
<p>Best value + strong gear</p>
<button class="buy" onclick="clickSound()">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ - ₹499 👑</h3>
<p>Ultimate power</p>
<button class="buy" onclick="clickSound()">Buy</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<h2>🪙 Coins</h2>
<div class="container">

<div class="card"><img src="coin1.png"><h3>400</h3><button class="buy" onclick="clickSound()">₹99</button></div>
<div class="card popular"><img src="coin2.png"><h3>900 ⭐</h3><button class="buy" onclick="clickSound()">₹199</button></div>
<div class="card"><img src="coin3.png"><h3>1500</h3><button class="buy" onclick="clickSound()">₹299</button></div>
<div class="card"><img src="coin4.png"><h3>2000</h3><button class="buy" onclick="clickSound()">₹399</button></div>
<div class="card"><img src="coin5.png"><h3>2700 💎</h3><button class="buy" onclick="clickSound()">₹499</button></div>

</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<h2>🎨 Tags</h2>
<div class="container">

<div class="card"><img src="toy.png"><h3>TOY</h3><button class="buy" onclick="clickSound()">Buy</button></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><button class="buy" onclick="clickSound()">Buy</button></div>
<div class="card popular"><img src="deadly.png"><h3>DEADLY</h3><button class="buy" onclick="clickSound()">Buy</button></div>

</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function login(){
  let u=document.getElementById("username").value;
  if(u===""){alert("Enter username");return;}
  show('ranks');
}

function clickSound(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}
</script>

</body>
</html>
