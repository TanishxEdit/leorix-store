<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeorixMC Store</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Segoe UI;
  background:url('bg.png') center/cover fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-2;
}

/* cursor glow */
#cursor{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle, white, transparent);
  border-radius:50%;
  pointer-events:none;
  filter:blur(40px);
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* sections */
.section{display:none;padding:40px;text-align:center;}
.section.active{display:block;animation:fade 0.5s;}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

/* buttons */
.btn{
  padding:15px 25px;
  margin:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #22c55e;
}

/* cards */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  width:260px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 40px #22c55e;
}

.card img{width:100%;}

/* popup CENTER FIX */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.box{
  background:#1e293b;
  width:500px;
  max-height:80vh;
  overflow-y:auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(34,197,94,0.5);
}
</style>
</head>

<body>

<div id="cursor"></div>

<!-- HOME -->
<div id="home" class="section active">
  <h1 style="font-size:50px;">LeorixMC Store</h1>
  <p>Choose a category</p>

  <button class="btn" onclick="go('ranks')">⚔ RANKS</button>
  <button class="btn" onclick="go('coins')">💰 COINS</button>
  <button class="btn" onclick="go('tags')">🏷 TAGS</button>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
<div class="container">

<div class="card">
<img src="prime.png">
<h3>Prime ₹119</h3>
<button class="btn" onclick="playClick(); openRank('Prime')">View</button>
<button class="btn">Buy</button>
</div>

<div class="card">
<img src="mythic.png">
<h3>Mythic ₹249</h3>
<button class="btn" onclick="playClick(); openRank('Mythic')">View</button>
<button class="btn">Buy</button>
</div>

<div class="card">
<img src="leorix.png">
<h3>Leorix+ ₹499</h3>
<button class="btn" onclick="playClick(); openRank('Leorix')">View</button>
<button class="btn">Buy</button>
</div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="section">
<div class="container">
<div class="card"><img src="coin1.png"><h3>400 Coins</h3><p>₹99</p></div>
<div class="card"><img src="coin2.png"><h3>900 Coins</h3><p>₹199</p></div>
<div class="card"><img src="coin3.png"><h3>1500 Coins</h3><p>₹299</p></div>
<div class="card"><img src="coin4.png"><h3>2000 Coins</h3><p>₹399</p></div>
<div class="card"><img src="coin5.png"><h3>2700 Coins</h3><p>₹499</p></div>
</div>
</div>

<!-- TAGS -->
<div id="tags" class="section">
<div class="container">
<div class="card"><img src="toy.png"><h3>TOY</h3><p>200 Coins</p></div>
<div class="card"><img src="meow.png"><h3>MEOW</h3><p>300 Coins</p></div>
<div class="card"><img src="deadly.png"><h3>DEADLY</h3><p>500 Coins</p></div>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* navigation */
function go(id){
  playClick();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* sound */
function playClick(){
  const s=document.getElementById("clickSound");
  if(s){ s.currentTime=0; s.play().catch(()=>{}); }
}

/* popup */
function openRank(name){
  popup.style.display="flex";

  if(name==="Prime"){
    title.innerText="PRIME ₹119";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 3<br><br>Diamond Armour (Protection IV)...`;
  }

  if(name==="Mythic"){
    title.innerText="MYTHIC ₹249";
    content.innerHTML=`✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 5<br><br>Netherite Armour...`;
  }

  if(name==="Leorix"){
    title.innerText="LEORIX+ ₹499";
    content.innerHTML=`✔ /pv 1<br>✔ /ec<br>✔ /craft<br>✔ /home 7<br><br>MAX OP Gear...`;
  }
}

function closePopup(){
  popup.style.display="none";
}

/* cursor glow */
document.addEventListener("mousemove",(e)=>{
  const c=document.getElementById("cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

</script>

</body>
</html>
